<!DOCTYPE html>
<html lang="en">
<head>
  
    <title>Document</title>
<style>

button{
    width: 100px;
    height: 100px;
    border-radius: 50px;
    border: none;
    background-color: rgb(90, 89, 89);
    color: white;
    font-size: 3rem;
    font-weight: bold;
    cursor:crosshair;
}
button:hover{
    background-color: rgb(105, 106, 107);
}
button:active{
    background-color: rgb(126, 126, 127);
}

a {
    font-size: 2rem;
    text-decoration: none;
    color: #000000;
    font-weight: 500;
    transition: all 0.3s ease; /* Makes the hover effect smooth */
    margin-top: 20%;
}

.op-btn:hover{
    background-color: orange;
}
.op-btn-c:hover{
    background-color: rgb(227, 27, 27);
}
.op-btn-eq:hover{
    background-color: rgb(87, 217, 12);
}

#keys{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 25px;
}

#calculator{
    font-family: Arial, Helvetica, sans-serif;
    background-color: rgb(33, 32, 32);
    border-radius: 15px;
    max-width: 500px;
    overflow: hidden;
}

#display{
    color:white;
    width:100%;
    padding: 20px;
    font-size: 5rem;
    text-align: left;
    border:none;
    background-color: rgb(49, 49, 49);
}



</style>
    



</head>

<body>

    <div id="calculator">
        <input id="display" readonly>

        <div id="keys">
            <button class="op-btn" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="op-btn" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="op-btn" onclick="appendToDisplay('*')">*</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="op-btn" onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="op-btn-eq" onclick="calculate()">=</button>
            <button class="op-btn-c" onclick="clearDisplay()">C</button>

        </div>

    </div>


<script>

//get the display element
const display = document.getElementById("display");

//three functions to display: append, calculate and clear
function appendToDisplay(input){
    //gets the value of what is in the function all in the index.html
    display.value += input;
}

function clearDisplay(){
    display.value = ""; //an empty string

}

function calculate(){
    //we can cheat slightly using the eval function...
    //try catch block to handle any errors automatically
    try{
        display.value = eval(display.value)
    }
    catch(error){
        display.value = "Error";
    }
    

}




</script>
<br><br><br>
<a href="../index.html">Home</a>



    
</body>
</html>
