<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 1rem;
        }

        a{
            text-decoration: none;
            color: rgb(0, 0, 0);
            padding: 10px;
            font-size: 16pt;
            background: linear-gradient(rgb(243, 231, 249), rgb(234, 198, 247));
            border-radius: 5px;
        }


        div{
            margin: 5px;
            padding: 5px;
        }

        #forLoop-imgContainer{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

        }   

        #forLoop-imgContainer img{
            width: 240px;
            height: 340px;
            margin: 10px;
            border-radius: 8px;
        }
    </style>
    


</head>
<body>  

    <div class="heading">
        <h1>Book Recomendations - CHANGE MADE</h1>
        <h2>Making a slideshow</h2>
        <p>This looks more like it!</p>
        <p>Copy the JS code and add in comments - how does it all work? Can you piece it together?</p>
    </div>

    <div id="forLoop-imgContainer">
        
    </div>

    <div class="footer">
        <p>What additonal features might be useful to add next? Think before you click the link! </p>
        <a href="bookRecs3.html">Next Step</a>
        
    </div>

    <script>
        let currentIndex = 0;

        function showImage(index){
            //understanding 'display' is the key here
            //as is knowing what an arrow function is
            imgElements.forEach(img => img.style.display = 'none');
            imgElements[index].style.display = 'block';
        };

        const images = [
            'books/children_of_time.jpg',
            'books/do_androids_dream.jpg',
            'books/get_coding1.png',
            'books/get_coding2.png',
            'books/grokking-algorithms.jpg',
            'ooks/grokking-data-structures.jpg',
            'books/hello_world.jpg',
            'books/manga1.jpg',
            'books/manga2.jpg',
            'books/manga3.jpg',
            'books/surveilance_capitalism.jpg',
            'books/weapons_of_mathdestruction.jpg',
            'books/you_look_like.jpg',
        ];

        const container = document.getElementById('forLoop-imgContainer');

        // create empty images array
        const imgElements = [];

        for (let i = 0; i < images.length; i++) {
            const img = document.createElement('img');
            img.src = images[i];
            container.appendChild(img);

            imgElements.push(img);
        }

        showImage(currentIndex);

        setInterval( () => {
            currentIndex++;
            if(currentIndex >= imgElements.length) {
                currentIndex = 0;
            }
            
            showImage(currentIndex);

        }, 3000);


    </script>

</body>
</html>
